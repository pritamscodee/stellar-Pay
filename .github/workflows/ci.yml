name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  frontend:
    name: Frontend — Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run build
      - run: npm run lint
      - run: npm test

  contract-poll:
    name: Contract (Poll) — Build & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: contracts/poll
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          toolchain: stable
      - run: cargo build --target wasm32-unknown-unknown --release
      - run: cargo test

  contract-reward:
    name: Contract (Reward) — Build & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [contract-poll]
    defaults:
      run:
        working-directory: contracts/reward
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          toolchain: stable
      - name: Build poll WASM (needed for contractimport)
        working-directory: contracts/poll
        run: cargo build --target wasm32-unknown-unknown --release
      - run: cargo build --target wasm32-unknown-unknown --release
      - run: cargo test

  backend:
    name: Backend — Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: cargo build --release
